services:
  redis:
    image: redis:7-alpine
    container_name: cfa-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: cfa-backend
    environment:
      - CFA_REDIS_URL=redis://cfa-redis:6379/0
      - CFA_CORS_ORIGINS=["http://localhost", "http://localhost:3000"]
    volumes:
      - upload_data:/app/storage/uploads
      - db_data:/app/storage/db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  worker:
    build: ./backend
    container_name: cfa-worker
    # solo pool: one task at a time per process, safe with SQLite.
    # To process multiple videos in parallel, scale with:
    #   docker compose up --scale worker=N
    # and switch to PostgreSQL (set CFA_DATABASE_URL).
    command: uv run celery -A app.worker.celery_app worker --loglevel=info --pool=solo
    environment:
      - CFA_REDIS_URL=redis://cfa-redis:6379/0
      # Override via .env or compose override to tune for your server:
      # CFA_ML_DEVICE=cuda        (auto-detected by default)
      # CFA_DEMOGRAPHICS_WORKERS=8
      # CFA_YOLO_BATCH_SIZE=16
      # CFA_FRAME_SKIP=2          (lower = more frames processed)
    volumes:
      - upload_data:/app/storage/uploads
      - db_data:/app/storage/db
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build: ./frontend
    container_name: cfa-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
  upload_data:
  db_data:
